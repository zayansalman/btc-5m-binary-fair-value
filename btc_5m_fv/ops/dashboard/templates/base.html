<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Fair-Value EMS · BTC 5m{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">FAIR-VALUE <b>EMS</b><span class="sub">Polymarket · BTC Up/Down 5m</span></div>
      <div class="controls">
        <div class="sse-indicator" title="Live connection">
          <span class="sse-dot connecting"></span><span class="sse-label">live</span>
        </div>
        <button class="btn start btn-ctl" onclick="handleStart()">▶ Start</button>
        <button class="btn stop btn-ctl" onclick="handleStop()">■ Stop</button>
        <button class="btn ghost btn-ctl" onclick="handleRefresh()">⟳ Refresh</button>
      </div>
    </header>

    {% block content %}{% endblock %}
  </div>

  <div class="toast-container"></div>
  <script src="/static/dashboard.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
