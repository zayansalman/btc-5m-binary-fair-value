<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Fair-Value EMS · BTC 5m{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">FAIR-VALUE <b>EMS</b><span class="sub">Polymarket · BTC Up/Down 5m</span></div>
      <div class="controls">
        <div class="mode-toggle" title="Switch execution mode">
          <button class="mode-opt paper {{ 'active' if mode == 'paper' else '' }}"
                  onclick="setMode('paper')">PAPER</button>
          <button class="mode-opt live {{ 'active' if mode == 'live' else '' }}"
                  {{ 'disabled' if not live_available else '' }}
                  title="{{ live_hint }}" onclick="setMode('live')">LIVE</button>
        </div>
        <div class="sse-indicator" title="Live connection">
          <span class="sse-dot connecting"></span><span class="sse-label">feed</span>
        </div>
        <button class="btn start btn-ctl" onclick="handleStart()">▶ Start</button>
        <button class="btn stop btn-ctl" onclick="handleStop()">■ Stop</button>
        <button class="btn ghost btn-ctl" onclick="handleRefresh()">⟳</button>
      </div>
    </header>

    {% block content %}{% endblock %}
  </div>

  <div class="toast-container"></div>
  <script src="/static/dashboard.js?v={{ static_version }}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
